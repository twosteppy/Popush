name: CI

on:
  push:
    branches: [main]
  pull_request:

# Zero data collection is a project directive; CI never sends anything anywhere.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-core:
    name: Rust core (fmt, clippy, test, type-gen)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy (deny warnings)
        run: cargo clippy -p popush-core --all-targets -- -D warnings

      - name: test popush-core
        run: cargo test -p popush-core

      - name: generated.ts is not stale
        run: |
          cargo run -p popush-core --example generate_types
          git diff --exit-code src/types/generated.ts \
            || (echo "src/types/generated.ts is stale; run: cargo run -p popush-core --example generate_types" && exit 1)

  rust-tauri:
    name: Rust Tauri binary (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WebKitGTK and Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        run: pnpm build
      - name: Check Tauri binary compiles
        run: cargo build -p popush --locked

  audit:
    name: Dependency audit (cargo-audit, cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  frontend:
    name: Frontend (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: prettier check
        run: pnpm exec prettier --check "src/**/*.{ts,tsx,css}"
      - name: eslint
        run: pnpm lint
      - name: vitest
        run: pnpm test
      - name: build
        run: pnpm build
