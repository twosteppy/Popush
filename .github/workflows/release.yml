name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build packages (AppImage, RPM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WebKitGTK and Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build AppImage and RPM via Tauri
        # GitHub runners have no FUSE, so linuxdeploy (which the AppImage step
        # runs) must extract-and-run instead of mounting, or bundling aborts.
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: pnpm tauri build
      - name: Collect packages and publish checksums
        run: |
          # A dedicated folder, not dist/ — Vite already builds the frontend
          # into dist/, and its dist/assets subfolder breaks `sha256sum *`.
          mkdir -p release-artifacts
          # Cargo places workspace artifacts under <repo>/target; probe both
          # that and the non-workspace src-tauri/target layout.
          find target/release/bundle src-tauri/target/release/bundle \
            \( -name '*.AppImage' -o -name '*.rpm' \) -exec cp {} release-artifacts/ \; 2>/dev/null || true
          cd release-artifacts
          # SHA256SUMS lists bare filenames so the one-command installer can
          # verify the AppImage it downloads.
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: popush-linux-packages
          path: release-artifacts/*
      - name: Attach packages to the GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.AppImage
            release-artifacts/*.rpm
            release-artifacts/SHA256SUMS
          body: |
            Popush, Your VPS, one click away. Built by twostep.

            Download the `.AppImage`, make it executable (`chmod +x`), and run it -
            or clone the repo and run `bash install.sh` to get a launcher icon and a
            Desktop shortcut automatically.
