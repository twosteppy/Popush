name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: Build packages (AppImage, RPM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install WebKitGTK and Tauri Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build AppImage and RPM via Tauri
        run: pnpm tauri build
      - name: Collect packages and publish checksums
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/appimage/*.AppImage dist/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/rpm/*.rpm dist/ 2>/dev/null || true
          cd dist
          # SHA256SUMS lists bare filenames so the one-command installer can
          # verify the AppImage it downloads.
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: popush-linux-packages
          path: dist/*
      - name: Attach packages to the GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.AppImage
            dist/*.rpm
            dist/SHA256SUMS
          body: |
            Popush — Your VPS, one click away. Built by twostep.

            Download the `.AppImage`, make it executable (`chmod +x`), and run it —
            or clone the repo and run `bash install.sh` to get a launcher icon and a
            Desktop shortcut automatically.

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - uses: actions/checkout@v4
      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: popush.flatpak
          manifest-path: packaging/flatpak/dev.popush.Popush.yml
