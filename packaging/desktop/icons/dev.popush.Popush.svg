<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Popush">
  <!-- Rounded-square background in a dark surface colour -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="#16161A"/>

  <!-- Subtle inner border for definition on dark backgrounds -->
  <rect x="8" y="8" width="496" height="496" rx="104" ry="104" fill="none" stroke="#2A2A32" stroke-width="4"/>

  <!-- Upward "push" chevron stack: two chevrons rising toward the server -->
  <g fill="none" stroke="#7C6BF2" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <!-- Leading chevron -->
    <polyline points="150,268 256,168 362,268"/>
    <!-- Trailing chevron (muted, greyscale) -->
    <polyline points="150,352 256,252 362,352" stroke="#4A4A55"/>
  </g>

  <!-- Short vertical shaft anchoring the push -->
  <line x1="256" y1="168" x2="256" y2="120" stroke="#7C6BF2" stroke-width="34" stroke-linecap="round"/>
</svg>
